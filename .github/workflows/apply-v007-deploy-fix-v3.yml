name: Apply v0.0.7 deployment fix v3

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-v007-deploy-fix-v3.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Run candidate source fixes
        run: |
          pip install pyyaml
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import yaml

          workflow = yaml.safe_load(
              Path('.github/workflows/apply-v007-deploy-fix-v2.yml').read_text()
          )
          steps = workflow['jobs']['fix']['steps']
          wanted = {'Apply backend fixes', 'Apply frontend fixes'}
          found = set()
          for step in steps:
              if step.get('name') in wanted:
                  subprocess.run(
                      step['run'],
                      shell=True,
                      check=True,
                      executable='/bin/bash',
                  )
                  found.add(step['name'])
          if found != wanted:
              raise SystemExit(f'Missing source-fix steps: {wanted - found}')
          PY

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Validate backend startup
        working-directory: backend
        run: |
          python -m compileall -q app
          python - <<'PY'
          from sqlalchemy.orm import configure_mappers
          from app.main import app

          configure_mappers()
          print(f'FastAPI startup validated with {len(app.routes)} routes')
          PY

      - name: Validate backend route sources
        working-directory: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          router = Path('app/api/router.py').read_text()
          pipeline = Path('app/api/routes/pipeline_stages.py').read_text()
          custom_fields = Path('app/api/routes/custom_fields.py').read_text()
          assert 'include_router(pipeline_stages.router, prefix="/pipeline-stages"' in router
          assert 'include_router(custom_fields.router, prefix="/custom-fields"' in router
          assert 'from app.services.workspace_service import require_workspace_access' in pipeline
          assert 'from app.services.workspace_service import require_workspace_access' in custom_fields
          print('Backend route registration sources validated')
          PY

      - name: Inspect Alembic heads
        working-directory: backend
        run: alembic heads

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated fixes
        run: |
          rm .github/workflows/apply-v007-deploy-fix-v2.yml
          rm .github/workflows/apply-v007-deploy-fix-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/api/router.py \
                  backend/app/api/routes/pipeline_stages.py \
                  backend/app/api/routes/custom_fields.py \
                  frontend/src/api/httpClient.ts \
                  frontend/src/components/settings/PipelineStagesSettings.tsx \
                  frontend/src/features/bulk-actions/BulkActionBar.tsx \
                  frontend/src/pages/PeopleListPage.tsx \
                  frontend/src/pages/SettingsPage.tsx \
                  .github/workflows/apply-v007-deploy-fix-v2.yml \
                  .github/workflows/apply-v007-deploy-fix-v3.yml
          git commit -m "Fix backend startup and frontend build regressions"
          git push
