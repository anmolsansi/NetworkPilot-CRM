name: Apply People filter build fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply source fix
        run: |
          python -c "from pathlib import Path; p = Path('frontend/src/pages/PeopleListPage.tsx'); t = p.read_text(); old = '  const handleSearch = (e: React.FormEvent) => {\n    e.preventDefault()\n    setPage(1)\n    setFilters(filterDraft)\n  }'; new = '  const applyFilters = () => {\n    setPage(1)\n    setFilters(filterDraft)\n  }'; assert old in t, 'Expected handleSearch block was not found'; p.write_text(t.replace(old, new, 1))"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated fix
        run: |
          rm .github/workflows/apply-people-filter-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/PeopleListPage.tsx .github/workflows/apply-people-filter-fix.yml
          git commit -m "Fix People filter build"
          git push origin HEAD:${{ github.head_ref }}
