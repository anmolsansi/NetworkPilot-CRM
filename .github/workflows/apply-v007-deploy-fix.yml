name: Apply v0.0.7 deployment fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-v007-deploy-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Fix backend imports and routes
        run: |
          python - <<'PY'
          from pathlib import Path

          pipeline_path = Path('backend/app/api/routes/pipeline_stages.py')
          pipeline = pipeline_path.read_text()
          old = 'from app.api.deps import get_db, require_workspace_access\n'
          new = (
              'from app.api.deps import get_db\n'
              'from app.services.workspace_service import require_workspace_access\n'
          )
          if old not in pipeline:
              raise SystemExit('Expected pipeline dependency import was not found')
          pipeline_path.write_text(pipeline.replace(old, new, 1))

          router_path = Path('backend/app/api/router.py')
          router = router_path.read_text()
          for stale_module in ('    settings,\n', '    users,\n'):
              if stale_module not in router:
                  raise SystemExit(f'Expected stale router import was not found: {stale_module.strip()}')
              router = router.replace(stale_module, '', 1)
          router_path.write_text(router)
          PY

          cat > backend/app/api/routes/custom_fields.py <<'PY'
          import uuid
          from typing import Sequence

          from fastapi import APIRouter, Depends, Query, status
          from sqlalchemy.ext.asyncio import AsyncSession

          from app.api.deps import get_db
          from app.schemas.custom_field import (
              CustomFieldCreate,
              CustomFieldResponse,
              CustomFieldUpdate,
          )
          from app.services.custom_field_service import CustomFieldService
          from app.services.workspace_service import require_workspace_access

          router = APIRouter(tags=["custom_fields"])


          @router.get("", response_model=list[CustomFieldResponse])
          async def list_custom_fields(
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> Sequence[CustomFieldResponse]:
              return await CustomFieldService.get_all_for_workspace(db, workspace_id)


          @router.post(
              "",
              response_model=CustomFieldResponse,
              status_code=status.HTTP_201_CREATED,
          )
          async def create_custom_field(
              data: CustomFieldCreate,
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> CustomFieldResponse:
              return await CustomFieldService.create(db, workspace_id, data)


          @router.put("/{field_id}", response_model=CustomFieldResponse)
          async def update_custom_field(
              field_id: uuid.UUID,
              data: CustomFieldUpdate,
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> CustomFieldResponse:
              return await CustomFieldService.update(db, field_id, workspace_id, data)


          @router.delete("/{field_id}", status_code=status.HTTP_204_NO_CONTENT)
          async def delete_custom_field(
              field_id: uuid.UUID,
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> None:
              await CustomFieldService.delete(db, field_id, workspace_id)
          PY

      - name: Fix frontend TypeScript regressions
        run: |
          python - <<'PY'
          from pathlib import Path

          http_path = Path('frontend/src/api/httpClient.ts')
          http = http_path.read_text()
          duplicate = '''// Saved Views API
          export const activitiesApi = {
            list: (workspaceId: string, limit = 50) => request<any>(`/activities?workspace_id=${workspaceId}&limit=${limit}`),
          }
          '''
          replacement = '''// Workspace activity feed API
          export const workspaceActivitiesApi = {
            list: (workspaceId: string, limit = 50) => request<any>(`/activities?workspace_id=${workspaceId}&limit=${limit}`),
          }
          '''
          if duplicate not in http:
              raise SystemExit('Expected duplicate activities API block was not found')
          http_path.write_text(http.replace(duplicate, replacement, 1))

          stages_path = Path('frontend/src/components/settings/PipelineStagesSettings.tsx')
          stages = stages_path.read_text()
          old_call = '''      await pipelineStagesApi.create(workspaceId, {
                  name: newStageName.trim(),
                  order: stages.length,
                })'''
          new_call = '''      await pipelineStagesApi.create({
                  name: newStageName.trim(),
                  order: stages.length,
                }, workspaceId)'''
          if old_call not in stages:
              raise SystemExit('Expected pipeline stage create call was not found')
          stages_path.write_text(stages.replace(old_call, new_call, 1))

          bulk_path = Path('frontend/src/features/bulk-actions/BulkActionBar.tsx')
          bulk = bulk_path.read_text()
          static_stages = '''const stageOptions = [
            { value: 'saved_for_later', label: 'Saved for Later' },
            { value: 'invite_sent', label: 'Invite Sent' },
            { value: 'invite_pending', label: 'Invite Pending' },
            { value: 'accepted', label: 'Accepted' },
            { value: 'waiting_for_reply', label: 'Waiting for Reply' },
            { value: 'replied', label: 'Replied' },
            { value: 'archived', label: 'Archived' },
          ]

          '''
          if static_stages not in bulk:
              raise SystemExit('Expected unused bulk stage options were not found')
          bulk_path.write_text(bulk.replace(static_stages, '', 1))

          people_path = Path('frontend/src/pages/PeopleListPage.tsx')
          people = people_path.read_text()
          response_interface = '''interface PeopleResponse {
            items: Person[]
            total: number
            page: number
            limit: number
          }

          '''
          if response_interface not in people:
              raise SystemExit('Expected unused PeopleResponse interface was not found')
          people = people.replace(response_interface, '', 1)
          old_columns = "const csvColumns: { label: string; key: SortKey | 'tags' }[] = ["
          new_columns = "const csvColumns: { label: string; key: SortKey | 'tags' | 'stage' }[] = ["
          if old_columns not in people:
              raise SystemExit('Expected CSV column type was not found')
          people = people.replace(old_columns, new_columns, 1)
          static_people_stages = '''const stageOptions = [
            { value: '', label: 'All Stages' },
            { value: 'invite_sent', label: 'Invite Sent' },
            { value: 'invite_pending', label: 'Invite Pending' },
            { value: 'accepted', label: 'Accepted' },
            { value: 'waiting_for_reply', label: 'Waiting for Reply' },
            { value: 'replied', label: 'Replied' },
            { value: 'archived', label: 'Archived' },
          ]

          '''
          if static_people_stages not in people:
              raise SystemExit('Expected unused People page stage options were not found')
          people = people.replace(static_people_stages, '', 1)
          old_header = "{column.key === 'tags' ? ("
          new_header = "{column.key === 'tags' || column.key === 'stage' ? ("
          if old_header not in people:
              raise SystemExit('Expected non-sortable tags header condition was not found')
          people_path.write_text(people.replace(old_header, new_header, 1))

          settings_path = Path('frontend/src/pages/SettingsPage.tsx')
          settings = settings_path.read_text()
          for stale_line in (
              "  const [activeTab, setActiveTab] = useState<'profile' | 'workspace' | 'stages' | 'custom_fields'>('profile')\n",
              '  const { profile } = useAuthStore()\n',
          ):
              if stale_line not in settings:
                  raise SystemExit(f'Expected stale Settings state was not found: {stale_line.strip()}')
              settings = settings.replace(stale_line, '', 1)
          settings_path.write_text(settings)
          PY

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Validate backend startup imports
        working-directory: backend
        run: |
          python -m compileall -q app
          python - <<'PY'
          from sqlalchemy.orm import configure_mappers

          from app.main import app

          configure_mappers()
          paths = {route.path for route in app.routes}
          assert '/api/v1/pipeline-stages' in paths, sorted(paths)
          assert '/api/v1/custom-fields' in paths, sorted(paths)
          print('Backend imports and ORM mappings validated')
          PY
          alembic heads

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated fixes
        run: |
          rm .github/workflows/apply-v007-deploy-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/api/router.py \
                  backend/app/api/routes/pipeline_stages.py \
                  backend/app/api/routes/custom_fields.py \
                  frontend/src/api/httpClient.ts \
                  frontend/src/components/settings/PipelineStagesSettings.tsx \
                  frontend/src/features/bulk-actions/BulkActionBar.tsx \
                  frontend/src/pages/PeopleListPage.tsx \
                  frontend/src/pages/SettingsPage.tsx \
                  .github/workflows/apply-v007-deploy-fix.yml
          git commit -m "Fix v0.0.7 deployment regressions"
          git push
