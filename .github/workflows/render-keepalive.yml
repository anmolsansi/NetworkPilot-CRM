name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "Set the RENDER_HEALTH_URL repository secret to enable keepalive pings."
            exit 0
          fi

          curl --fail --show-error --silent --max-time 30 "$RENDER_HEALTH_URL"
