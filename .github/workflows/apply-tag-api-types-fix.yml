name: Apply Tag API type fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/fix-tag-api-types'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Add tag API response types
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/src/api/httpClient.ts')
          text = path.read_text()

          old_import = "import { supabase } from '../auth/supabaseClient'\n"
          new_import = old_import + "import type { Tag } from '../types'\n"
          if "import type { Tag } from '../types'" not in text:
              if old_import not in text:
                  raise SystemExit('Expected Supabase import was not found')
              text = text.replace(old_import, new_import, 1)

          old_block = """export const tagsApi = {
            list: (workspaceId: string) => {
              return request(`/tags?workspace_id=${workspaceId}`)
            },
            create: (workspaceId: string, data: { name: string, color?: string }) => {
              return request('/tags', {
                method: 'POST',
                body: JSON.stringify({ workspace_id: workspaceId, ...data })
              })
            },
            delete: (tagId: string, workspaceId: string) => {
              return request(`/tags/${tagId}?workspace_id=${workspaceId}`, { method: 'DELETE' })
            }
          }
          """
          new_block = """export const tagsApi = {
            list: (workspaceId: string) => {
              return request<Tag[]>(`/tags?workspace_id=${workspaceId}`)
            },
            create: (workspaceId: string, data: { name: string, color?: string }) => {
              return request<Tag>('/tags', {
                method: 'POST',
                body: JSON.stringify({ workspace_id: workspaceId, ...data })
              })
            },
            delete: (tagId: string, workspaceId: string) => {
              return request<void>(`/tags/${tagId}?workspace_id=${workspaceId}`, { method: 'DELETE' })
            }
          }
          """
          if old_block not in text:
              raise SystemExit('Expected tagsApi block was not found')

          path.write_text(text.replace(old_block, new_block, 1))
          PY

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated fix
        run: |
          rm .github/workflows/apply-tag-api-types-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/api/httpClient.ts .github/workflows/apply-tag-api-types-fix.yml
          git commit -m "Fix tag API response types"
          git push origin HEAD:${{ github.head_ref }}
