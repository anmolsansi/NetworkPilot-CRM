name: Apply v0.0.7 deployment fix v2

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-v007-deploy-fix-v2.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Apply backend fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/app/api/routes/pipeline_stages.py')
          text = path.read_text()
          old = 'from app.api.deps import get_db, require_workspace_access\n'
          new = 'from app.api.deps import get_db\nfrom app.services.workspace_service import require_workspace_access\n'
          if old not in text:
              raise SystemExit('Expected pipeline dependency import was not found')
          path.write_text(text.replace(old, new, 1))

          path = Path('backend/app/api/router.py')
          text = path.read_text()
          for stale in ('    settings,\n', '    users,\n'):
              if stale not in text:
                  raise SystemExit(f'Expected stale router import was not found: {stale.strip()}')
              text = text.replace(stale, '', 1)
          path.write_text(text)
          PY

          cat > backend/app/api/routes/custom_fields.py <<'PY'
          import uuid
          from typing import Sequence

          from fastapi import APIRouter, Depends, Query, status
          from sqlalchemy.ext.asyncio import AsyncSession

          from app.api.deps import get_db
          from app.schemas.custom_field import CustomFieldCreate, CustomFieldResponse, CustomFieldUpdate
          from app.services.custom_field_service import CustomFieldService
          from app.services.workspace_service import require_workspace_access

          router = APIRouter(tags=["custom_fields"])

          @router.get("", response_model=list[CustomFieldResponse])
          async def list_custom_fields(
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> Sequence[CustomFieldResponse]:
              return await CustomFieldService.get_all_for_workspace(db, workspace_id)

          @router.post("", response_model=CustomFieldResponse, status_code=status.HTTP_201_CREATED)
          async def create_custom_field(
              data: CustomFieldCreate,
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> CustomFieldResponse:
              return await CustomFieldService.create(db, workspace_id, data)

          @router.put("/{field_id}", response_model=CustomFieldResponse)
          async def update_custom_field(
              field_id: uuid.UUID,
              data: CustomFieldUpdate,
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> CustomFieldResponse:
              return await CustomFieldService.update(db, field_id, workspace_id, data)

          @router.delete("/{field_id}", status_code=status.HTTP_204_NO_CONTENT)
          async def delete_custom_field(
              field_id: uuid.UUID,
              workspace_id: uuid.UUID = Query(...),
              _workspace=Depends(require_workspace_access),
              db: AsyncSession = Depends(get_db),
          ) -> None:
              await CustomFieldService.delete(db, field_id, workspace_id)
          PY

      - name: Apply frontend fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/src/api/httpClient.ts')
          text = path.read_text()
          old = '''// Saved Views API
          export const activitiesApi = {
            list: (workspaceId: string, limit = 50) => request<any>(`/activities?workspace_id=${workspaceId}&limit=${limit}`),
          }
          '''
          new = '''// Workspace activity feed API
          export const workspaceActivitiesApi = {
            list: (workspaceId: string, limit = 50) => request<any>(`/activities?workspace_id=${workspaceId}&limit=${limit}`),
          }
          '''
          if old not in text:
              raise SystemExit('Expected duplicate activities API block was not found')
          path.write_text(text.replace(old, new, 1))

          path = Path('frontend/src/components/settings/PipelineStagesSettings.tsx')
          text = path.read_text()
          old = '''      await pipelineStagesApi.create(workspaceId, {
                  name: newStageName.trim(),
                  order: stages.length,
                })'''
          new = '''      await pipelineStagesApi.create({
                  name: newStageName.trim(),
                  order: stages.length,
                }, workspaceId)'''
          if old not in text:
              raise SystemExit('Expected pipeline stage create call was not found')
          path.write_text(text.replace(old, new, 1))

          path = Path('frontend/src/features/bulk-actions/BulkActionBar.tsx')
          text = path.read_text()
          old = '''const stageOptions = [
            { value: 'saved_for_later', label: 'Saved for Later' },
            { value: 'invite_sent', label: 'Invite Sent' },
            { value: 'invite_pending', label: 'Invite Pending' },
            { value: 'accepted', label: 'Accepted' },
            { value: 'waiting_for_reply', label: 'Waiting for Reply' },
            { value: 'replied', label: 'Replied' },
            { value: 'archived', label: 'Archived' },
          ]

          '''
          if old not in text:
              raise SystemExit('Expected unused bulk stage options were not found')
          path.write_text(text.replace(old, '', 1))

          path = Path('frontend/src/pages/PeopleListPage.tsx')
          text = path.read_text()
          old = '''interface PeopleResponse {
            items: Person[]
            total: number
            page: number
            limit: number
          }

          '''
          if old not in text:
              raise SystemExit('Expected unused PeopleResponse interface was not found')
          text = text.replace(old, '', 1)
          old = "const csvColumns: { label: string; key: SortKey | 'tags' }[] = ["
          new = "const csvColumns: { label: string; key: SortKey | 'tags' | 'stage' }[] = ["
          if old not in text:
              raise SystemExit('Expected CSV column type was not found')
          text = text.replace(old, new, 1)
          old = '''const stageOptions = [
            { value: '', label: 'All Stages' },
            { value: 'invite_sent', label: 'Invite Sent' },
            { value: 'invite_pending', label: 'Invite Pending' },
            { value: 'accepted', label: 'Accepted' },
            { value: 'waiting_for_reply', label: 'Waiting for Reply' },
            { value: 'replied', label: 'Replied' },
            { value: 'archived', label: 'Archived' },
          ]

          '''
          if old not in text:
              raise SystemExit('Expected unused People page stage options were not found')
          text = text.replace(old, '', 1)
          old = "{column.key === 'tags' ? ("
          new = "{column.key === 'tags' || column.key === 'stage' ? ("
          if old not in text:
              raise SystemExit('Expected sortable header condition was not found')
          path.write_text(text.replace(old, new, 1))

          path = Path('frontend/src/pages/SettingsPage.tsx')
          text = path.read_text()
          for stale in (
              "  const [activeTab, setActiveTab] = useState<'profile' | 'workspace' | 'stages' | 'custom_fields'>('profile')\n",
              '  const { profile } = useAuthStore()\n',
          ):
              if stale not in text:
                  raise SystemExit(f'Expected stale Settings state was not found: {stale.strip()}')
              text = text.replace(stale, '', 1)
          path.write_text(text)
          PY

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Validate backend
        working-directory: backend
        run: |
          python -m compileall -q app
          python - <<'PY'
          from sqlalchemy.orm import configure_mappers
          from app.main import app

          configure_mappers()
          paths = {route.path.rstrip('/') for route in app.routes}
          assert '/api/v1/pipeline-stages' in paths, sorted(paths)
          assert '/api/v1/custom-fields' in paths, sorted(paths)
          print('Backend startup, mappings, and routes validated')
          PY
          alembic heads

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated fixes
        run: |
          rm .github/workflows/apply-v007-deploy-fix-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/api/router.py \
                  backend/app/api/routes/pipeline_stages.py \
                  backend/app/api/routes/custom_fields.py \
                  frontend/src/api/httpClient.ts \
                  frontend/src/components/settings/PipelineStagesSettings.tsx \
                  frontend/src/features/bulk-actions/BulkActionBar.tsx \
                  frontend/src/pages/PeopleListPage.tsx \
                  frontend/src/pages/SettingsPage.tsx \
                  .github/workflows/apply-v007-deploy-fix-v2.yml
          git commit -m "Fix backend startup and frontend build regressions"
          git push
