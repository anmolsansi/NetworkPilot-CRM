name: Apply health route fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-health-route-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Fix health route
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/app/api/routes/health.py')
          text = path.read_text()
          old = '@router.get("/health")'
          new = '@router.get("")'
          if old not in text:
              raise SystemExit('Expected health route decorator was not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Verify health route source
        run: |
          python -m py_compile backend/app/api/routes/health.py
          grep -F '@router.get("")' backend/app/api/routes/health.py
          grep -F 'include_router(health.router, prefix="/health"' backend/app/api/router.py
          if grep -F '@router.get("/health")' backend/app/api/routes/health.py; then
            echo 'Double-prefixed health route still exists'
            exit 1
          fi

      - name: Commit validated fix
        run: |
          rm .github/workflows/apply-health-route-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/api/routes/health.py .github/workflows/apply-health-route-fix.yml
          git commit -m "Fix health check route"
          git push
